<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TetherFlow Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['"Space Mono"', 'monospace'],
          },
          colors: {
            slate: {
              900: '#0a0a0f',
              850: '#12121c',
              800: '#1f1f2e',
              700: '#2d2d42',
              600: '#3f3f5a',
              500: '#58587a',
              400: '#75759a',
              300: '#9595b8',
              200: '#b8b8d4',
            },
            teal: {
              400: '#c084fc',
              500: '#a855f7',
            },
            blue: {
              400: '#f472b6',
              500: '#ec4899',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden select-none">
  <!-- Main App Container -->
  <div id="app" class="flex flex-col h-screen w-full max-w-md mx-auto relative bg-slate-900 shadow-2xl overflow-hidden transition-all duration-300">
    
    <header id="app-header" class="flex items-center justify-between py-2.5 px-4 bg-slate-850 border-b border-slate-800 z-10 shrink-0">
      <div class="flex items-center space-x-2">
        <div id="user-avatar" class="w-6 h-6 rounded-full bg-slate-700 flex items-center justify-center text-[10px] overflow-hidden skeleton"></div>
        <div>
          <h1 id="user-name" class="font-bold text-xs skeleton w-20 h-3 mb-0.5 rounded"></h1>
          <p id="user-id" class="text-[9px] text-slate-400 skeleton w-12 h-2.5 rounded"></p>
        </div>
      </div>
      <div class="flex items-center relative">
        <div class="text-right pointer-events-none">
          <p class="text-[9px] text-slate-400 uppercase tracking-wide">Заработано</p>
          <p id="header-balance" class="font-bold text-teal-400 text-xs">0.00 USDT</p>
        </div>
      </div>
    </header>

    <main id="content-area" class="flex-1 overflow-y-auto pb-20 relative scroll-smooth hide-scrollbar"></main>

    <nav class="absolute bottom-0 animate-slide-up delay-150 w-full bg-slate-900/85 backdrop-blur-xl border-t border-slate-700/50 flex justify-around items-center pb-safe pt-3 z-20 shadow-[0_-15px_40px_rgba(0,0,0,0.6)]">
      <button class="nav-btn active flex flex-col items-center pt-2 pb-2 w-1/5 cursor-pointer tap-effect" data-tab="home">
        <i class="fas fa-home text-xl mb-1 relative z-10"></i>
        <span class="text-[10px] font-medium tracking-wide relative z-10">Главная</span>
      </button>
      <button class="nav-btn flex flex-col items-center pt-2 pb-2 w-1/5 cursor-pointer tap-effect" data-tab="tasks">
        <i class="fas fa-tasks text-xl mb-1 relative z-10"></i>
        <span class="text-[10px] font-medium tracking-wide relative z-10">Задания</span>
      </button>
      <button class="nav-btn flex flex-col items-center pt-2 pb-2 w-1/5 cursor-pointer tap-effect" data-tab="friends">
        <i class="fas fa-users text-xl mb-1 relative z-10"></i>
        <span class="text-[10px] font-medium tracking-wide relative z-10">Друзья</span>
      </button>
      <button class="nav-btn flex flex-col items-center pt-2 pb-2 w-1/5 cursor-pointer tap-effect" data-tab="profile">
        <i class="fas fa-user text-xl mb-1 relative z-10"></i>
        <span class="text-[10px] font-medium tracking-wide relative z-10">Профиль</span>
      </button>
      <button id="nav-admin" class="nav-btn hidden flex-col items-center pt-2 pb-2 w-1/5 cursor-pointer tap-effect" data-tab="admin">
        <i class="fas fa-shield-alt text-xl mb-1 relative z-10"></i>
        <span class="text-[10px] font-medium tracking-wide relative z-10">Админ</span>
      </button>
    </nav>
  </div>

  <!-- Admin Panel -->
  <div id="admin-app" class="fixed inset-0 bg-slate-900 z-[100] hidden flex-col md:flex-row w-full h-full overflow-hidden text-white">
    
    <aside class="hidden md:flex w-64 bg-[#0d1321] border-r border-slate-800/50 flex-col shrink-0 relative overflow-hidden z-20">
      <div class="absolute -left-20 -top-20 w-48 h-48 bg-teal-500/10 rounded-full blur-[80px] pointer-events-none"></div>
      <div class="absolute -right-20 bottom-0 w-48 h-48 bg-blue-500/10 rounded-full blur-[80px] pointer-events-none"></div>
      <div class="p-6 border-b border-slate-800/50 flex justify-between items-center relative z-10 backdrop-blur-md">
        <div>
          <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500 tracking-tight drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">TetherFlow</h2>
          <span class="text-[9px] text-teal-500/80 font-mono uppercase tracking-widest font-bold">Admin Pro V3</span>
        </div>
        <button class="close-admin-btn w-8 h-8 rounded-full bg-slate-800/80 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition-colors shadow-inner border border-slate-700 tap-effect"><i class="fas fa-sign-out-alt text-xs"></i></button>
      </div>
      <nav class="flex-1 p-4 space-y-2.5 overflow-y-auto hide-scrollbar relative z-10" id="admin-nav-desktop">
        <button class="admin-tab-btn active w-full flex items-center space-x-3.5 p-3.5 rounded-2xl text-left transition-all bg-teal-500/10 text-teal-400 font-bold text-sm border border-teal-500/20 shadow-inner group tap-effect" data-atab="dashboard">
          <i class="fas fa-chart-pie w-6 text-center text-lg group-hover:scale-110 transition-transform"></i><span class="tracking-wide">Дашборд</span>
        </button>
        <button class="admin-tab-btn w-full flex items-center space-x-3.5 p-3.5 rounded-2xl text-left transition-all text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-bold text-sm border border-transparent hover:border-slate-700/50 group tap-effect" data-atab="users">
          <i class="fas fa-users w-6 text-center text-lg group-hover:scale-110 transition-transform"></i><span class="tracking-wide">Пользователи</span>
        </button>
        <button class="admin-tab-btn w-full flex items-center space-x-3.5 p-3.5 rounded-2xl text-left transition-all text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-bold text-sm border border-transparent hover:border-slate-700/50 group tap-effect" data-atab="tasks">
          <i class="fas fa-tasks w-6 text-center text-lg group-hover:scale-110 transition-transform"></i><span class="tracking-wide">Задания</span>
        </button>
        <button class="admin-tab-btn w-full flex items-center space-x-3.5 p-3.5 rounded-2xl text-left transition-all text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-bold text-sm border border-transparent hover:border-slate-700/50 group tap-effect" data-atab="finances">
          <i class="fas fa-wallet w-6 text-center text-lg group-hover:scale-110 transition-transform"></i><span class="tracking-wide">Финансы</span>
        </button>
        <button class="admin-tab-btn w-full flex items-center space-x-3.5 p-3.5 rounded-2xl text-left transition-all text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-bold text-sm border border-transparent hover:border-slate-700/50 group tap-effect" data-atab="settings">
          <i class="fas fa-cogs w-6 text-center text-lg group-hover:scale-110 transition-transform"></i><span class="tracking-wide">Настройки</span>
        </button>
        <button class="admin-tab-btn w-full flex items-center space-x-3.5 p-3.5 rounded-2xl text-left transition-all text-slate-400 hover:bg-slate-800/50 hover:text-slate-200 font-bold text-sm border border-transparent hover:border-slate-700/50 group tap-effect" data-atab="broadcast">
          <i class="fas fa-bullhorn w-6 text-center text-lg group-hover:scale-110 transition-transform"></i><span class="tracking-wide">Рассылка</span>
        </button>
      </nav>
      <div class="p-4 border-t border-slate-800/50 text-[10px] text-slate-500 font-bold text-center uppercase tracking-widest relative z-10 bg-slate-900/30">
        v3.0.0 Premium
      </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-slate-900">
      <header class="md:hidden flex justify-between items-center p-4 bg-[#0d1321]/90 backdrop-blur-xl border-b border-slate-800/50 shrink-0 z-20 shadow-lg relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-teal-500/10 to-blue-500/10 pointer-events-none"></div>
        <h2 class="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500 flex items-center space-x-2 relative z-10">
          <i class="fas fa-shield-alt text-teal-400"></i>
          <span class="tracking-tight">Admin Pro</span>
        </h2>
        <button class="close-admin-btn w-9 h-9 rounded-full bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-700 transition-colors tap-effect shadow-inner border border-slate-700 relative z-10"><i class="fas fa-times"></i></button>
      </header>

      <div id="admin-content-area" class="flex-1 overflow-y-auto p-4 md:p-6 pb-24 md:pb-6 scroll-smooth hide-scrollbar">
        <!-- Injected via JS -->
      </div>
    </main>

    <nav class="md:hidden absolute bottom-0 w-full bg-slate-900/85 backdrop-blur-xl border-t border-slate-700/50 flex justify-around items-center pb-safe pt-3 z-20 shadow-[0_-15px_40px_rgba(0,0,0,0.6)]" id="admin-nav-mobile">
      <button class="admin-tab-btn active flex-1 flex flex-col items-center pt-2 pb-2 cursor-pointer tap-effect" data-atab="dashboard">
        <i class="fas fa-chart-pie text-lg mb-1 relative z-10"></i>
        <span class="text-[9px] font-medium tracking-wide relative z-10">Дашборд</span>
      </button>
      <button class="admin-tab-btn flex-1 flex flex-col items-center pt-2 pb-2 cursor-pointer tap-effect" data-atab="users">
        <i class="fas fa-users text-lg mb-1 relative z-10"></i>
        <span class="text-[9px] font-medium tracking-wide relative z-10">Юзеры</span>
      </button>
      <button class="admin-tab-btn flex-1 flex flex-col items-center pt-2 pb-2 cursor-pointer tap-effect" data-atab="tasks">
        <i class="fas fa-tasks text-lg mb-1 relative z-10"></i>
        <span class="text-[9px] font-medium tracking-wide relative z-10">Задания</span>
      </button>
      <button class="admin-tab-btn flex-1 flex flex-col items-center pt-2 pb-2 cursor-pointer tap-effect" data-atab="finances">
        <i class="fas fa-wallet text-lg mb-1 relative z-10"></i>
        <span class="text-[9px] font-medium tracking-wide relative z-10">Финансы</span>
      </button>
      <button class="admin-tab-btn flex-1 flex flex-col items-center pt-2 pb-2 cursor-pointer tap-effect" data-atab="settings">
        <i class="fas fa-cog text-lg mb-1 relative z-10"></i>
        <span class="text-[9px] font-medium tracking-wide relative z-10">Настройки</span>
      </button>
      <button class="admin-tab-btn flex-1 flex flex-col items-center pt-2 pb-2 cursor-pointer tap-effect" data-atab="broadcast">
        <i class="fas fa-bullhorn text-lg mb-1 relative z-10"></i>
        <span class="text-[9px] font-medium tracking-wide relative z-10">Рассылка</span>
      </button>
    </nav>
  </div>

  <!-- Overlays -->
  <div id="modal-overlay" class="fixed inset-0 bg-black/80 z-[150] hidden flex items-center justify-center backdrop-blur-sm transition-opacity opacity-0">
    <div id="modal-content" class="bg-slate-850 w-11/12 max-w-sm rounded-3xl border border-slate-700 shadow-2xl transform scale-95 transition-transform p-6 max-h-[90vh] overflow-y-auto hide-scrollbar">
    </div>
  </div>

  <div id="block-screen" class="fixed inset-0 bg-slate-900 z-[200] hidden flex-col items-center justify-center text-center p-6 backdrop-blur-md bg-opacity-95">
    <div id="block-icon" class="text-6xl mb-4 drop-shadow-lg"></div>
    <h2 id="block-title" class="text-2xl font-bold text-white mb-2"></h2>
    <p id="block-msg" class="text-slate-400 mb-6 max-w-xs leading-relaxed text-sm"></p>
    <button id="dev-bypass-btn" class="text-xs text-slate-500 underline px-4 py-2 mt-4 hover:text-white transition-colors hidden">Продолжить для теста (Dev)</button>
  </div>

  <div id="toast" class="fixed top-20 left-1/2 transform -translate-x-1/2 bg-teal-500 text-white font-bold px-5 py-2.5 rounded-2xl shadow-lg shadow-teal-500/20 z-[160] transition-all opacity-0 pointer-events-none translate-y-[-20px] text-center w-max max-w-[90%] text-sm">
    Уведомление
  </div>

  <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <script src="https://miniapps.ai/sdk/miniapps-ai-v1.js"></script>
  <script src="features.js"></script>
  <script src="main.js"></script>
</body>
</html>
